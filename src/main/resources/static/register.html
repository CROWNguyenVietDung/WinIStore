<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng ký | WinIStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
  <div class="min-vh-100 d-flex align-items-center">
    <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow border-0 overflow-hidden">
          <div class="bg-success text-white p-4">
            <div class="d-flex align-items-center gap-2">
              <div class="rounded-circle bg-white text-success d-inline-flex align-items-center justify-content-center" style="width:42px;height:42px;">
                <i class="bi bi-person-plus-fill"></i>
              </div>
              <div>
                <div class="fw-semibold">Tạo tài khoản WinIStore</div>
                <div class="text-white-50 small">Nhanh gọn, không cần địa chỉ</div>
              </div>
            </div>
          </div>
          <div class="card-body p-4 p-md-5">
            <div id="alert" class="alert d-none" role="alert"></div>

            <form id="registerForm" class="needs-validation" novalidate>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input name="email" type="email" class="form-control" placeholder="you@gmail.com" required />
                  <div class="invalid-feedback">Vui lòng nhập email.</div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                  <input id="password" name="password" type="password" minlength="6" class="form-control" placeholder="Tối thiểu 6 ký tự" required />
                  <button class="btn btn-outline-secondary" type="button" id="togglePw" aria-label="Hiện/ẩn mật khẩu">
                    <i class="bi bi-eye"></i>
                  </button>
                  <div class="invalid-feedback">Mật khẩu tối thiểu 6 ký tự.</div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Họ và tên</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input name="fullName" type="text" class="form-control" placeholder="Nguyễn Văn A" required />
                  <div class="invalid-feedback">Vui lòng nhập họ và tên.</div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                  <input name="phone" type="text" class="form-control" placeholder="09xxxxxxxx" required />
                  <div class="invalid-feedback">Vui lòng nhập số điện thoại.</div>
                </div>
              </div>

              <button id="submitBtn" class="btn btn-success w-100" type="submit">
                <span class="me-2" id="btnSpinner" style="display:none"><span class="spinner-border spinner-border-sm"></span></span>
                Đăng ký
              </button>

              <div class="mt-3 text-center">
                <span class="text-muted">Đã có tài khoản?</span>
                <a href="./login.html" class="text-decoration-none">Đăng nhập</a>
              </div>
            </form>
          </div>
        </div>
        <p class="text-center text-muted mt-3 mb-0 small">© WinIStore</p>
      </div>
    </div>
  </div>
  </div>

  <script src="./app.js"></script>
  <script>
    const { apiPost } = window.WinIStore;
    const alertEl = document.getElementById("alert");
    const form = document.getElementById("registerForm");
    const submitBtn = document.getElementById("submitBtn");
    const btnSpinner = document.getElementById("btnSpinner");

    function showAlert(type, msg) {
      alertEl.className = `alert alert-${type}`;
      alertEl.textContent = msg;
    }

    document.getElementById("togglePw").addEventListener("click", () => {
      const input = document.getElementById("password");
      const icon = document.querySelector("#togglePw i");
      const isPw = input.type === "password";
      input.type = isPw ? "text" : "password";
      icon.className = isPw ? "bi bi-eye-slash" : "bi bi-eye";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      form.classList.add("was-validated");
      if (!form.checkValidity()) return;

      const payload = {
        email: form.email.value.trim(),
        password: form.password.value,
        fullName: form.fullName.value.trim(),
        phone: form.phone.value.trim(),
      };

      try {
        btnSpinner.style.display = "inline-block";
        submitBtn.disabled = true;
        await apiPost("/api/auth/register", payload);
        showAlert("success", "Đăng ký thành công. Đang chuyển sang trang đăng nhập...");
        setTimeout(() => (window.location.href = "./login.html?registered=1"), 800);
      } catch (err) {
        showAlert("danger", err.message || "Đăng ký thất bại");
      } finally {
        btnSpinner.style.display = "none";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
