<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kết quả thanh toán | WinIStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body { background: #f2f4f7; }
    .golden-text {
      background: linear-gradient(90deg, #ffe08a 0%, #ffd24a 25%, #f7b500 50%, #ffefb7 75%, #d4a000 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      font-weight: 800; letter-spacing: 0.2px; font-size: 3.375rem; line-height: 1; display: inline-block;
    }
    .app-header { background: linear-gradient(90deg, #0b63ce 0%, #0d7ee8 55%, #12a6ff 100%); }
    .app-menu {
      background: linear-gradient(90deg, #0b63ce 0%, #0d7ee8 55%, #12a6ff 100%);
      border: 1px solid rgba(255, 255, 255, 0.95); border-radius: 0.6rem;
    }
    .app-menu .nav-item { margin-right: 1.2rem; }
    .app-menu .nav-link { color: #fff; font-size: 1.1rem; padding: 0.75rem 1rem; }
    .app-menu .nav-link:hover, .app-menu .nav-link:focus { color: #fff; background: rgba(255,255,255,0.14); border-radius: .45rem; }
    .avatar-sm { width: 34px; height: 34px; object-fit: cover; }
    .user-toggle { border: 1px solid rgba(255, 255, 255, .95); border-radius: .75rem; padding: .35rem .55rem; background: rgba(255,255,255,.08); }
    .result-card { border-radius: .95rem; border: 1px solid rgba(15,23,42,.08); }
  </style>
</head>
<body>
<nav class="navbar navbar-expand navbar-dark app-header py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="./user.html">
      <span class="golden-text">WinIStore</span>
    </a>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <div id="userMenu" class="dropdown">
        <a class="user-toggle d-flex align-items-center gap-2 text-decoration-none dropdown-toggle" href="#"
           id="userMenuBtn" data-bs-toggle="dropdown" aria-expanded="false">
          <img id="headerAvatarImg" class="rounded-circle border bg-white avatar-sm" src="https://placehold.co/34x34/png?text=A" alt="avatar">
          <span id="headerFullName" class="fw-semibold text-white">—</span>
        </a>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="./profile.html">Quản lý thông tin</a></li>
          <li><a class="dropdown-item" href="./orders.html">Đơn hàng</a></li>
          <li><button class="dropdown-item" type="button" id="logoutHeaderBtn">Đăng xuất</button></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<nav class="navbar navbar-expand-lg navbar-dark app-menu py-1 mt-1 mx-2 mx-md-3">
  <div class="container">
    <div class="collapse navbar-collapse show">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link fw-semibold" href="./user.html">Trang chủ</a></li>
        <li class="nav-item"><a class="nav-link fw-semibold" href="./orders.html">Đơn hàng</a></li>
        <li class="nav-item"><a class="nav-link fw-semibold" href="./cart.html">Giỏ hàng</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow-sm result-card">
        <div class="card-body p-4 p-md-5 text-center">
          <div id="resultIcon" class="display-4 mb-2 text-success"><i class="bi bi-check-circle"></i></div>
          <h4 id="resultTitle" class="mb-2">Thanh toán thành công</h4>
          <p id="resultMessage" class="text-muted mb-3">Đơn hàng của bạn đã được tạo thành công.</p>
          <div class="small text-muted mb-4" id="resultMeta"></div>
          <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a id="goOrderBtn" class="btn btn-primary" href="./orders.html">Xem đơn hàng</a>
            <a id="goHomeBtn" class="btn btn-outline-secondary" href="./user.html">Tiếp tục mua sắm</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="./app.js"></script>
<script>
  (function () {
    const u = window.WinIStore.getSession();
    if (u) {
      document.getElementById("headerFullName").textContent = u.fullName || u.email || "—";
      document.getElementById("headerAvatarImg").src = u.avatar || "https://placehold.co/34x34/png?text=A";
    }
    document.getElementById("logoutHeaderBtn")?.addEventListener("click", () => window.WinIStore.goToLogin());

    const sp = new URLSearchParams(window.location.search || "");
    const success = sp.get("success") === "1";
    const orderId = (sp.get("orderId") || "").trim();
    const txnRef = (sp.get("txnRef") || "").trim();
    const message = (sp.get("message") || "").trim();

    const titleEl = document.getElementById("resultTitle");
    const msgEl = document.getElementById("resultMessage");
    const iconEl = document.getElementById("resultIcon");
    const metaEl = document.getElementById("resultMeta");
    const goOrderBtn = document.getElementById("goOrderBtn");

    if (success) {
      try { localStorage.setItem("winstore_cart", "[]"); } catch {}
      titleEl.textContent = "Thanh toán thành công";
      msgEl.textContent = "Hệ thống đã ghi nhận thanh toán VNPay và tạo đơn hàng.";
      iconEl.className = "display-4 mb-2 text-success";
      iconEl.innerHTML = '<i class="bi bi-check-circle-fill"></i>';
      metaEl.textContent = `Mã đơn: #${orderId || "—"}${txnRef ? " | Mã giao dịch: " + txnRef : ""}`;
      if (orderId) goOrderBtn.href = `./orders.html?success=1&orderId=${encodeURIComponent(orderId)}`;
      window.setTimeout(() => { window.location.href = goOrderBtn.href; }, 3200);
      return;
    }

    titleEl.textContent = "Thanh toán chưa thành công";
    msgEl.textContent = message || "Bạn có thể thử lại hoặc chọn phương thức thanh toán khác.";
    iconEl.className = "display-4 mb-2 text-danger";
    iconEl.innerHTML = '<i class="bi bi-x-circle-fill"></i>';
    metaEl.textContent = txnRef ? `Mã giao dịch: ${txnRef}` : "";
    goOrderBtn.href = "./checkout.html";
    goOrderBtn.textContent = "Quay lại thanh toán";
  })();
</script>
</body>
</html>
